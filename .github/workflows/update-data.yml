name: Update match data

on:
  schedule:
    - cron: '0 6 * * 1'   # 每周一次（每周一 UTC 06:00 / 北京时间 14:00）
  workflow_dispatch:        # 也可以在 GitHub 网页上手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Fetch latest match data
        run: node scripts/fetch-data.js

      - name: Commit if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/matches.json src/data/teams.json
          git diff --cached --quiet || git commit -m "chore: update match data $(date -u '+%Y-%m-%d')"
          git push
